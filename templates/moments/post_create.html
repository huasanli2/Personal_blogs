{% extends 'base.html' %}

{% block title %}发布 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3 flex items-center gap-4">
        <a href="{% url 'moments:home' %}" class="text-dark-secondary hover:text-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-lg font-bold">发布</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="p-4">
        {% csrf_token %}
        <div class="flex gap-3">
            <div class="flex-shrink-0">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" class="w-10 h-10 rounded-full object-cover">
                {% else %}
                <div class="w-10 h-10 rounded-full bg-dark-card flex items-center justify-center">{{ user.get_display_name|first }}</div>
                {% endif %}
            </div>
            <div class="flex-1">
                <textarea name="content" rows="4" required placeholder="分享此刻..."
                          class="w-full bg-transparent text-lg outline-none resize-none placeholder:text-dark-secondary mb-4"></textarea>

                <div id="image-previews" class="flex flex-wrap gap-2 mb-4"></div>

                <div class="flex flex-wrap gap-2 mb-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="mood" value="" class="hidden peer" checked>
                        <span class="px-3 py-1.5 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">无</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="mood" value="happy" class="hidden peer">
                        <span class="px-3 py-1.5 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">😊 开心</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="mood" value="love" class="hidden peer">
                        <span class="px-3 py-1.5 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🥰 恋爱</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="mood" value="miss" class="hidden peer">
                        <span class="px-3 py-1.5 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🥺 想念</span>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="mood" value="excited" class="hidden peer">
                        <span class="px-3 py-1.5 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🤩 兴奋</span>
                    </label>
                </div>

                <div class="flex items-center justify-between pt-3 border-t border-dark-border">
                    <div class="flex items-center gap-2">
                        <label class="cursor-pointer p-2 rounded-full hover:bg-blue-500/10 text-blue-500 transition">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                            <input type="file" name="images" id="post-images" multiple accept="image/*" class="hidden">
                        </label>
                        <input type="text" name="location" placeholder="位置" class="bg-transparent text-sm outline-none text-dark-secondary placeholder:text-dark-secondary w-32">
                    </div>
                    <button type="submit" class="bg-blue-500 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-blue-600 transition">
                        发布
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    const imageInput = document.getElementById('post-images');
    const previewContainer = document.getElementById('image-previews');

    imageInput.addEventListener('change', function() {
        previewContainer.innerHTML = '';
        if (this.files.length === 0) return;

        Array.from(this.files).forEach((file, idx) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'relative';
            wrapper.innerHTML = `
                <img src="${URL.createObjectURL(file)}" class="w-20 h-20 rounded-lg object-cover border border-dark-border">
                <span class="absolute -top-1 -right-1 w-5 h-5 bg-dark-card border border-dark-border text-dark-secondary rounded-full text-xs flex items-center justify-center">${idx + 1}</span>
            `;
            previewContainer.appendChild(wrapper);
        });
    });
</script>
{% endblock %}
