{% load post_filters %}
<span id="like-area-{{ post.id }}">
    <button hx-post="{% url 'moments:toggle_like' post.id %}"
            hx-target="#like-area-{{ post.id }}"
            hx-swap="outerHTML"
            class="flex items-center gap-1.5 text-dark-secondary hover:text-pink-500 transition">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="{% if liked %}#ec4899{% else %}none{% endif %}" stroke="{% if liked %}#ec4899{% else %}currentColor{% endif %}" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span class="text-sm">{{ post.likes.count }}</span>
    </button>
</span>
