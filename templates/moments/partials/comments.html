<div id="comments-area-{{ post.id }}">
    {% for comment in post.comments.all %}
    <div class="flex gap-3 py-3">
        {% if comment.author.avatar %}
        <img src="{{ comment.author.avatar.url }}" class="w-8 h-8 rounded-full object-cover flex-shrink-0">
        {% else %}
        <div class="w-8 h-8 rounded-full bg-dark-card flex items-center justify-center text-xs flex-shrink-0">{{ comment.author.get_display_name|first }}</div>
        {% endif %}
        <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
                <span class="font-bold text-sm">{{ comment.author.get_display_name }}</span>
                <span class="text-dark-secondary text-xs">{{ comment.created_at|timesince }}</span>
            </div>
            <p class="text-[15px]">{{ comment.content }}</p>
        </div>
    </div>
    {% endfor %}
</div>
