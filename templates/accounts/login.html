<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OurNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { bg: '#000', card: '#16181c', border: '#2f3336', text: '#e7e9ea', secondary: '#71767b' } } } }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-4">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold tracking-tight">OurNest</h1>
            <p class="text-dark-secondary mt-2 text-sm">属于我们的私密空间</p>
        </div>

        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-3 rounded-lg mb-2 text-sm bg-red-900/50 text-red-400 border border-red-800">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <input type="text" name="username" required placeholder="用户名"
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition placeholder:text-dark-secondary">
            </div>
            <div>
                <input type="password" name="password" required placeholder="密码"
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition placeholder:text-dark-secondary">
            </div>
            <button type="submit"
                    class="w-full bg-white text-black py-3 rounded-full font-bold hover:bg-gray-200 transition">
                登录
            </button>
        </form>
    </div>
</body>
</html>
