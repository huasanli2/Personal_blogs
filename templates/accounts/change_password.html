{% extends 'base.html' %}

{% block title %}修改密码 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3 flex items-center gap-4">
        <a href="{% url 'accounts:profile' %}" class="text-dark-secondary hover:text-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-lg font-bold">修改密码</h2>
    </div>

    <div class="p-4">
        <form method="post" class="space-y-5 max-w-md">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-dark-secondary mb-1">原密码</label>
                <input type="password" name="old_password" required
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm text-dark-secondary mb-1">新密码</label>
                <input type="password" name="new_password" required minlength="4"
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm text-dark-secondary mb-1">确认新密码</label>
                <input type="password" name="confirm_password" required minlength="4"
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
            </div>

            <button type="submit" class="bg-white text-black px-6 py-2.5 rounded-full font-bold hover:bg-gray-200 transition text-sm">
                修改密码
            </button>
        </form>
    </div>
</div>
{% endblock %}
