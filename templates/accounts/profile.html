{% extends 'base.html' %}

{% block title %}个人 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3">
        <h2 class="text-lg font-bold">个人资料</h2>
    </div>

    <div class="p-4">
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="flex items-center gap-4">
                {% if user.avatar %}
                <img src="{{ user.avatar.url }}" class="w-20 h-20 rounded-full object-cover ring-2 ring-dark-border">
                {% else %}
                <div class="w-20 h-20 rounded-full bg-dark-card flex items-center justify-center text-2xl ring-2 ring-dark-border">
                    {{ user.get_display_name|first }}
                </div>
                {% endif %}
                <div>
                    <label class="text-sm text-blue-500 hover:text-blue-400 cursor-pointer transition">
                        更换头像
                        <input type="file" name="avatar" accept="image/*" class="hidden">
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm text-dark-secondary mb-1">昵称</label>
                <input type="text" name="nickname" value="{{ user.nickname }}"
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm text-dark-secondary mb-1">个性签名</label>
                <input type="text" name="bio" value="{{ user.bio }}" placeholder="写点什么..."
                       class="w-full px-4 py-3 bg-transparent border border-dark-border rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition placeholder:text-dark-secondary">
            </div>

            <button type="submit"
                    class="bg-white text-black px-6 py-2.5 rounded-full font-bold hover:bg-gray-200 transition text-sm">
                保存
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-dark-border space-y-3">
            <a href="{% url 'accounts:change_password' %}" class="block text-blue-500 hover:text-blue-400 text-sm transition">修改密码</a>
            <a href="{% url 'accounts:logout' %}" class="block text-red-500 hover:text-red-400 text-sm transition">退出登录</a>
        </div>
    </div>
</div>
{% endblock %}
