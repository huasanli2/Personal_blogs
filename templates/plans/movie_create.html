{% extends 'base.html' %}

{% block title %}添加影视 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3 flex items-center gap-4">
        <a href="{% url 'plans:movie_list' %}" class="text-dark-secondary hover:text-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-lg font-bold">添加影视</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="p-4 space-y-5">
        {% csrf_token %}

        <input type="text" name="title" required placeholder="片名..."
               class="w-full bg-transparent border-b border-dark-border py-3 outline-none text-lg placeholder:text-dark-secondary focus:border-blue-500 transition">

        <div>
            <div class="flex flex-wrap gap-2">
                <label class="cursor-pointer">
                    <input type="radio" name="movie_type" value="movie" class="hidden peer" checked>
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🎬 电影</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="movie_type" value="tv" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">📺 电视剧</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="movie_type" value="variety" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🎭 综艺</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="movie_type" value="anime" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🎌 动漫</span>
                </label>
            </div>
        </div>

        <textarea name="description" rows="2" placeholder="简介..."
                  class="w-full bg-transparent border-b border-dark-border py-3 outline-none resize-none placeholder:text-dark-secondary focus:border-blue-500 transition"></textarea>

        <label class="cursor-pointer inline-flex items-center gap-2 text-blue-500 hover:text-blue-400 transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            添加海报
            <input type="file" name="poster" accept="image/*" class="hidden">
        </label>

        <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-full font-bold hover:bg-blue-600 transition">
            添加
        </button>
    </form>
</div>
{% endblock %}
