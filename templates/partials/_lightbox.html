<div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center cursor-pointer">
    <img id="lightbox-img" src="" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg">
    <button class="absolute top-4 right-4 text-white/70 hover:text-white text-3xl" onclick="closeLightbox()">&times;</button>
</div>
<script>
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        const lb = document.getElementById('lightbox');
        lb.classList.remove('hidden');
        lb.classList.add('flex');
    }
    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.add('hidden');
        lb.classList.remove('flex');
    }
    document.getElementById('lightbox').addEventListener('click', closeLightbox);
    document.addEventListener('click', function(e) {
        const trigger = e.target.closest('.lightbox-trigger');
        if (trigger) {
            e.stopPropagation();
            openLightbox(trigger.src);
        }
    });
</script>
