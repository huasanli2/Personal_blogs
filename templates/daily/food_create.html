{% extends 'base.html' %}

{% block title %}记录美食 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3 flex items-center gap-4">
        <a href="{% url 'daily:food_list' %}" class="text-dark-secondary hover:text-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-lg font-bold">记录美食</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="p-4 space-y-5">
        {% csrf_token %}

        <div>
            <div class="flex flex-wrap gap-2">
                <label class="cursor-pointer">
                    <input type="radio" name="meal_type" value="breakfast" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🌅 早餐</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="meal_type" value="lunch" class="hidden peer" checked>
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">☀️ 午餐</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="meal_type" value="dinner" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🌙 晚餐</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="meal_type" value="snack" class="hidden peer">
                    <span class="px-4 py-2 rounded-full border border-dark-border text-sm peer-checked:bg-dark-card peer-checked:border-blue-500 transition">🍰 加餐</span>
                </label>
            </div>
        </div>

        <input type="text" name="title" required placeholder="吃了什么..."
               class="w-full bg-transparent border-b border-dark-border py-3 outline-none text-lg placeholder:text-dark-secondary focus:border-blue-500 transition">

        <textarea name="description" rows="2" placeholder="味道怎么样？"
                  class="w-full bg-transparent border-b border-dark-border py-3 outline-none resize-none placeholder:text-dark-secondary focus:border-blue-500 transition"></textarea>

        <input type="text" name="location" placeholder="在哪吃的？"
               class="w-full bg-transparent border-b border-dark-border py-3 outline-none placeholder:text-dark-secondary focus:border-blue-500 transition">

        <div>
            <label class="cursor-pointer inline-flex items-center gap-2 text-blue-500 hover:text-blue-400 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                添加照片
                <input type="file" name="image" accept="image/*" class="hidden">
            </label>
        </div>

        <input type="date" name="date" value="{% now 'Y-m-d' %}"
               class="bg-dark-card px-3 py-2 rounded-lg border border-dark-border text-sm outline-none focus:border-blue-500">

        <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-full font-bold hover:bg-blue-600 transition">
            保存
        </button>
    </form>
</div>

{% endblock %}
