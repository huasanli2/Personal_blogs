{% extends 'base.html' %}

{% block title %}写悄悄话 - OurNest{% endblock %}

{% block content %}
<div class="border-x border-dark-border min-h-screen">
    <div class="sticky top-14 z-40 bg-black/80 backdrop-blur-md border-b border-dark-border px-4 py-3 flex items-center gap-4">
        <a href="{% url 'daily:whisper_list' %}" class="text-dark-secondary hover:text-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h2 class="text-lg font-bold">写悄悄话</h2>
    </div>

    <form method="post" enctype="multipart/form-data" class="p-4 space-y-5">
        {% csrf_token %}

        <textarea name="content" rows="4" required placeholder="想说的悄悄话..."
                  class="w-full bg-transparent outline-none text-lg resize-none placeholder:text-dark-secondary"></textarea>

        <label class="cursor-pointer inline-flex items-center gap-2 text-blue-500 hover:text-blue-400 transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            添加图片
            <input type="file" name="image" accept="image/*" class="hidden">
        </label>

        <label class="flex items-center gap-3 cursor-pointer">
            <div class="relative">
                <input type="checkbox" name="is_anonymous" class="sr-only peer">
                <div class="w-10 h-6 bg-dark-border rounded-full peer-checked:bg-blue-500 transition"></div>
                <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full peer-checked:translate-x-4 transition"></div>
            </div>
            <span class="text-sm text-dark-secondary">匿名发送</span>
        </label>

        <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-full font-bold hover:bg-blue-600 transition">
            发送
        </button>
    </form>
</div>
{% endblock %}
